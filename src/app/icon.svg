<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background with subtle gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#346a48"/>
      <stop offset="1" stop-color="#244f33"/>
    </linearGradient>
    <linearGradient id="bird" x1="120" y1="100" x2="400" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f0ece3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Bird – geometric, reads well at 16px -->
  <g transform="translate(100, 80) scale(1.05)">
    <!-- Head -->
    <circle cx="115" cy="120" r="46" fill="url(#bird)"/>
    <!-- Eye -->
    <circle cx="128" cy="112" r="10" fill="#2d5f3f"/>
    <!-- Beak -->
    <path d="M155 108 L185 98 L165 120 Z" fill="url(#bird)"/>
    <!-- Body + wing sweep -->
    <path d="M100 160 C 120 220, 160 290, 290 290 L 310 250 L 250 240 L 270 190 L 200 215 Z" fill="url(#bird)"/>
    <!-- Wing detail line -->
    <path d="M120 180 C 150 200, 200 220, 260 210" stroke="#2d5f3f" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.2"/>
    <!-- Tail feathers -->
    <path d="M280 280 L 310 310 L 270 305 Z" fill="url(#bird)" opacity="0.85"/>
  </g>
</svg>
